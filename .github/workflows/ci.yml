name: CI - Frontend
on: [push]
jobs:
  docker-build:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
      - run: dev
      - name: build image
        run: make docker-build


  eks-deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          repository: phanikolluri-devops/helm-chart-v1
          path: helm
      - name: helm deploy
        run: make eks-deploy

  
        




        
